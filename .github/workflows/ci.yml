name: CI

run-name: "CI - ${{ github.ref_name }} #${{ github.run_number }}"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install just
      uses: extractions/setup-just@v2
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      run: just install
    - name: Run mypy and pytest
      run: just test-core
    - name: Generate resume PDF
      run: just run
    - name: Upload resume PDF
      uses: actions/upload-artifact@v4
      with:
        name: resume-pdf
        path: generated/*.pdf
        retention-days: 30

  e2e-tests:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: |
          web/frontend/node_modules
          web/backend/node_modules
        key: ${{ runner.os }}-npm-${{ hashFiles('web/frontend/package-lock.json', 'web/backend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-
    - name: Install frontend dependencies
      run: npm --prefix web/frontend install
    - name: Install backend dependencies
      run: npm --prefix web/backend install
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: /home/runner/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('web/frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    - name: Install Playwright browsers
      run: npx --prefix web/frontend playwright install --with-deps chromium
    - name: Install just
      uses: extractions/setup-just@v2
    - name: Run E2E tests
      run: just test-e2e
    - name: Upload Playwright report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: web/frontend/playwright-report/
        retention-days: 7
